workflows:
  ios-build:
    name: FitPilot iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Disable code signing in Xcode project
        script: |
          cd ios
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' '/CODE_SIGN_IDENTITY/!b;n;s/"Apple Development"/""/g' Runner.xcodeproj/project.pbxproj

          ruby -e '
            path = "Runner.xcodeproj/project.pbxproj"
            content = File.read(path)
            content.gsub!(/CODE_SIGNING_REQUIRED = YES/, "CODE_SIGNING_REQUIRED = NO")
            content.gsub!(/CODE_SIGNING_ALLOWED = YES/, "CODE_SIGNING_ALLOWED = NO")
            unless content.include?("CODE_SIGNING_ALLOWED = NO")
              content.gsub!(/buildSettings = \{/) { |m| "#{m}\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;" }
            end
            File.write(path, content)
          '
          echo "Code signing disabled"

      - name: Build iOS
        script: |
          set -eo pipefail
          flutter build ios --release --no-codesign 2>&1 | tee build_log.txt
          echo "=== Checking for built app ==="
          find build -name "Runner.app" -type d 2>/dev/null
          APP=$(find build/ios/iphoneos -name "Runner.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            du -sh "$APP"
          fi

      - name: Package unsigned IPA
        script: |
          APP=$(find build/ios/iphoneos -name "Runner.app" -type d 2>/dev/null | head -1)
          echo "Found: $APP"
          du -sh "$APP" 2>/dev/null
          if [ -d "$APP" ]; then
            mkdir -p Payload
            cp -r "$APP" Payload/
            zip -r FitPilot-unsigned.ipa Payload
            ls -la FitPilot-unsigned.ipa
          else
            echo "No app found, searching..."
            find build -name "*.app" -type d 2>/dev/null
            exit 1
          fi

    artifacts:
      - FitPilot-unsigned.ipa
      - '**/*.ipa'
