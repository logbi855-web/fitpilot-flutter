workflows:
  ios-build:
    name: FitPilot iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Disable code signing
        script: |
          cd ios
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGNING_REQUIRED=YES"/"CODE_SIGNING_REQUIRED=NO"/g' Runner.xcodeproj/project.pbxproj

      - name: Build iOS
        script: |
          set -e

          echo "=== Flutter pub get ==="
          flutter pub get

          echo "=== Generating Flutter build files ==="
          flutter build ios --debug --no-codesign 2>&1 || true

          echo "=== Running xcodebuild ==="
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            SYMROOT=$CM_BUILD_DIR/build/ios/output \
            2>&1 | tee build_log.txt

          echo "=== Build result: $? ==="
          echo "=== Checking output ==="
          find $CM_BUILD_DIR/build/ios/output -name "*.app" -type d
          du -sh $CM_BUILD_DIR/build/ios/output/Debug-iphoneos/Runner.app 2>/dev/null

      - name: Package unsigned IPA
        script: |
          APP_PATH="$CM_BUILD_DIR/build/ios/output/Debug-iphoneos/Runner.app"

          if [ ! -d "$APP_PATH" ]; then
            echo "Not at expected path, searching..."
            find $CM_BUILD_DIR -name "Runner.app" -type d
            APP_PATH=$(find $CM_BUILD_DIR -name "Runner.app" -type d -path "*/Debug-iphoneos/*" | head -1)
          fi

          echo "Using APP_PATH: $APP_PATH"
          ls -la "$APP_PATH" 2>/dev/null
          du -sh "$APP_PATH" 2>/dev/null

          if [ -d "$APP_PATH" ] && [ "$(du -sm "$APP_PATH" | cut -f1)" -gt 1 ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r FitPilot-unsigned.ipa Payload
            echo "=== IPA size ==="
            ls -la FitPilot-unsigned.ipa
          else
            echo "ERROR: Runner.app is missing or too small"
            echo "Full search:"
            find / -name "Runner.app" -type d 2>/dev/null
            exit 1
          fi

    artifacts:
      - '**/*.ipa'
      - FitPilot-unsigned.ipa
      - Payload/*.app
