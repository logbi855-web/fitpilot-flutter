workflows:
  ios-build:
    name: FitPilot iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Disable code signing
        script: |
          cd ios
          sed -i '' 's/CODE_SIGN_IDENTITY = "Apple Development"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = "iPhone Developer"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/"CODE_SIGNING_REQUIRED=YES"/"CODE_SIGNING_REQUIRED=NO"/g' Runner.xcodeproj/project.pbxproj

      - name: Build iOS
        script: |
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Debug \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            DEVELOPMENT_TEAM="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            BUILD_DIR=build/ios \
            -allowProvisioningUpdates \
            | xcpretty

      - name: Package unsigned IPA
        script: |
          echo "=== Searching for Runner.app ==="
          find . -name "Runner.app" -type d 2>/dev/null
          find /Users -name "Runner.app" -type d 2>/dev/null
          find ~/Library/Developer/Xcode -name "Runner.app" -type d 2>/dev/null

          APP_PATH=$(find . -name "Runner.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "Runner.app" -type d 2>/dev/null | grep Debug-iphoneos | head -1)
          fi

          echo "Found: $APP_PATH"

          if [ -n "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r FitPilot-unsigned.ipa Payload
            ls -la FitPilot-unsigned.ipa
          else
            echo "ERROR: Runner.app not found"
            find / -name "Runner.app" -type d 2>/dev/null
            exit 1
          fi

    artifacts:
      - '**/*.ipa'
      - FitPilot-unsigned.ipa
      - Payload/*.app
