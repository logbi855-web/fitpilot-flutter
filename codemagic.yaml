workflows:
  ios-build:
    name: FitPilot iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Build iOS
        script: |
          set -eo pipefail
          flutter build ios --debug --simulator 2>&1 | tee build_log.txt
          echo "=== Checking for built app ==="
          find build -name "*.app" -type d 2>/dev/null
          APP=$(find build -name "Runner.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            du -sh "$APP"
          fi

      - name: Package app
        script: |
          APP=$(find build -name "Runner.app" -type d 2>/dev/null | head -1)
          echo "Found: $APP"
          if [ -d "$APP" ]; then
            zip -r FitPilot-simulator.zip "$APP"
            ls -la FitPilot-simulator.zip
          else
            echo "No app found"
            find . -name "*.app" -type d 2>/dev/null
            exit 1
          fi

    artifacts:
      - FitPilot-simulator.zip
      - '**/*.zip'
