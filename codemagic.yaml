workflows:
  ios-build:
    name: FitPilot iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      flutter: stable
      xcode: latest
    scripts:
      - name: Get dependencies
        script: flutter pub get

      - name: Install CocoaPods
        script: |
          cd ios
          pod install

      - name: Disable code signing in Xcode project
        script: |
          cd ios
          # Disable all code signing in project.pbxproj
          sed -i '' 's/CODE_SIGN_IDENTITY = ".*"/CODE_SIGN_IDENTITY = ""/g' Runner.xcodeproj/project.pbxproj
          sed -i '' 's/DEVELOPMENT_TEAM = .*;/DEVELOPMENT_TEAM = "";/g' Runner.xcodeproj/project.pbxproj
          sed -i '' '/CODE_SIGN_IDENTITY/!b;n;s/"Apple Development"/""/g' Runner.xcodeproj/project.pbxproj

          # Add signing overrides to every build config
          ruby -e '
            path = "Runner.xcodeproj/project.pbxproj"
            content = File.read(path)
            content.gsub!(/CODE_SIGNING_REQUIRED = YES/, "CODE_SIGNING_REQUIRED = NO")
            content.gsub!(/CODE_SIGNING_ALLOWED = YES/, "CODE_SIGNING_ALLOWED = NO")
            unless content.include?("CODE_SIGNING_ALLOWED = NO")
              content.gsub!(/buildSettings = \{/) { |m| "#{m}\n\t\t\t\tCODE_SIGNING_ALLOWED = NO;\n\t\t\t\tCODE_SIGNING_REQUIRED = NO;" }
            end
            File.write(path, content)
          '
          echo "Code signing disabled"

      - name: Build iOS
        script: |
          set -eo pipefail
          flutter build ios --debug --no-codesign 2>&1 | tee build_log.txt

          echo "=== Checking for built app ==="
          find build/ios -name "Runner.app" -type d 2>/dev/null
          find . -path "*/Debug-iphoneos/Runner.app" -type d 2>/dev/null

          # Check size
          APP=$(find build/ios -name "Runner.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ]; then
            du -sh "$APP"
          fi

      - name: Package unsigned IPA
        script: |
          APP_PATH=$(find . -name "Runner.app" -type d -path "*/Debug-iphoneos/*" 2>/dev/null | head -1)

          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find . -name "Runner.app" -type d 2>/dev/null | sort -r | head -1)
          fi

          echo "Using: $APP_PATH"
          du -sh "$APP_PATH" 2>/dev/null

          if [ -d "$APP_PATH" ]; then
            mkdir -p Payload
            cp -r "$APP_PATH" Payload/
            zip -r FitPilot-unsigned.ipa Payload
            ls -la FitPilot-unsigned.ipa
          else
            echo "FAILED: no Runner.app found"
            exit 1
          fi

    artifacts:
      - FitPilot-unsigned.ipa
      - '**/*.ipa'
