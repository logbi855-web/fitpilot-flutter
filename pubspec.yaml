name: my_app_flutter
description: "FitPilot — AI-powered fitness companion app."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.6.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # HTTP client
  dio: ^5.7.0

  # Local storage
  shared_preferences: ^2.3.3

  # Fonts
  google_fonts: 6.1.0

  # Image picker
  image_picker: ^1.1.2

  # File paths
  path_provider: ^2.1.4

  # Date formatting / i18n
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1
  custom_lint: ^0.7.5
  riverpod_lint: ^2.6.1

flutter:
  uses-material-design: true
